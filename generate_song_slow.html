<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>曲目变速（完整歌曲文件夹）生成</title><script src="chart-speed-processor-core.js"></script><script src="https://unpkg.com/wasm-media-encoders@0.7.0/dist/umd/WasmMediaEncoder.min.js"></script><script src="https://unpkg.com/jszip@3/dist/jszip.min.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:40px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.form-full{grid-column:span 2}input[type="text"],input[type="number"]{width:100%;padding:10px 12px;border:2px solid#ddd;border-radius:6px;font-size:14px;transition:border-color 0.3s ease}input[type="text"]:focus,input[type="number"]:focus{outline:none;border-color:#667eea}input[type="checkbox"]{width:18px;height:18px;cursor:pointer}.checkbox-label{display:flex;align-items:center;gap:8px}.auto-detect-section{background:#f9f9ff;border-radius:8px;padding:16px;margin-top:8px}.auto-detect-textarea{width:100%;min-height:100px;padding:10px;border:1px solid#ddd;border-radius:6px;font-family:monospace;font-size:12px;resize:vertical;margin-bottom:8px}.btn-secondary{background:#f0f0f0;color:#333}.btn-secondary:hover{background:#e0e0e0}.btn-small{padding:8px 16px;font-size:14px}.field-highlight{animation:highlight 1s ease}@keyframes highlight{0%{background-color:#fef3c7}100%{background-color:transparent}}h1{color:#333;font-size:24px;margin-bottom:8px;text-align:center}.subtitle{color:#666;font-size:14px;text-align:center;margin-bottom:32px}.form-group{margin-bottom:24px}label{display:block;color:#333;font-weight:600;margin-bottom:8px;font-size:14px}.file-upload{border:2px dashed#ddd;border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.3s ease}.file-upload:hover{border-color:#667eea;background:#f8f9ff}.file-upload.dragover{border-color:#667eea;background:#f0f2ff}.file-upload.has-file{border-color:#10b981;background:#f0fdf4}.file-icon{font-size:40px;margin-bottom:12px}.file-text{color:#666;font-size:14px}.file-name{color:#667eea;font-weight:600;margin-top:8px;word-break:break-all}input[type="file"]{display:none}.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s ease}.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,0.4)}.btn-primary:disabled{opacity:0.5;cursor:not-allowed}.status{text-align:center;margin-top:20px;font-size:14px;min-height:20px}.status.success{color:#10b981}.status.error{color:#ef4444}.status.info{color:#667eea}.title-localized-row{display:grid;grid-template-columns:80px 1fr 32px;gap:8px;align-items:center;margin-bottom:8px}.title-localized-lang{width:100%}.title-localized-text{width:100%;min-width:0}.btn-remove{width:32px;height:32px;padding:0;border:none;background:#fee2e2;color:#ef4444;border-radius:6px;cursor:pointer;font-size:16px;line-height:32px;text-align:center}.btn-remove:hover{background:#fecaca}.btn-add{width:auto;padding:6px 16px;font-size:13px;background:#f0f0f0;color:#333;border:none;border-radius:6px;cursor:pointer;margin-top:4px}.btn-add:hover{background:#e0e0e0}.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}.loading-overlay.show{display:flex}.loading-content{background:#fff;padding:24px 48px;border-radius:12px;text-align:center}.loading-spinner{width:40px;height:40px;border:4px solid#f3f3f3;border-top:4px solid#667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="container"><h1>曲目变速（完整歌曲文件夹）生成</h1><p class="subtitle">上传谱面和音频，生成完整歌曲文件夹</p><div class="form-group"><label>chart</label><div class="file-upload"id="chartUpload"><div class="file-icon">📄</div><div class="file-text">点击或拖拽谱面文件到此处</div><div class="file-name"id="chartFileName"></div></div><input type="file"id="chartInput"accept=".aff,.txt,*"></div><div class="form-group"><label>audio</label><div class="file-upload"id="audioUpload"><div class="file-icon">🎵</div><div class="file-text">点击或拖拽音频文件到此处</div><div class="file-name"id="audioFileName"></div></div><input type="file"id="audioInput"accept="audio/*"></div><div class="form-row"><div class="form-group"><label>1080_base.jpg(可选)</label><div class="file-upload"id="img1080Upload"><div class="file-icon">🖼️</div><div class="file-text">点击或拖拽图片</div><div class="file-name"id="img1080FileName"></div></div><input type="file"id="img1080Input"accept="image/*"></div><div class="form-group"><label>1080_base_256.jpg(可选)</label><div class="file-upload"id="img256Upload"><div class="file-icon">🖼️</div><div class="file-text">点击或拖拽图片</div><div class="file-name"id="img256FileName"></div></div><input type="file"id="img256Input"accept="image/*"></div></div><div class="form-group"><label>song info</label><div class="form-row"><div><label style="font-weight: 400; font-size: 12px; color: #888;">id</label><input type="text"id="fieldId"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">artist</label><input type="text"id="fieldArtist"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">bpm</label><input type="text"id="fieldBpm"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">bpm_base</label><input type="number"id="fieldBpmBase"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">set</label><input type="text"id="fieldSet"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">audioPreview</label><input type="number"id="fieldAudioPreview"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">audioPreviewEnd</label><input type="number"id="fieldAudioPreviewEnd"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">side</label><input type="number"id="fieldSide"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">rating</label><input type="number"id="fieldRating"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">bg</label><input type="text"id="fieldBg"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">bg_inverse</label><input type="text"id="fieldBgInverse"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">date</label><input type="number"id="fieldDate"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">version</label><input type="text"id="fieldVersion"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">chartDesigner</label><input type="text"id="fieldChartDesigner"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">jacketDesigner</label><input type="text"id="fieldJacketDesigner"></div></div><div style="margin-top: 12px;"><label style="font-weight: 400; font-size: 12px; color: #888;">title_localized</label><div id="titleLocalizedContainer"></div><button class="btn-add"id="addTitleLangBtn">+add language</button></div><div class="form-row"style="margin-top: 8px;"><div class="checkbox-label"><input type="checkbox"id="fieldRatingPlus"><label style="font-weight: 400; font-size: 13px;">ratingPlus</label></div></div><div class="auto-detect-section"><label style="font-weight: 400; font-size: 13px; color: #667eea;">📋auto detect</label><textarea class="auto-detect-textarea"id="autoDetectInput"placeholder="paste JSON or text here..."></textarea><button class="btn btn-secondary btn-small"id="autoDetectBtn">auto fill</button></div></div><button class="btn btn-primary"id="processBtn"disabled>开始处理</button><div class="status"id="status"></div></div><div class="loading-overlay"id="loadingOverlay"><div class="loading-content"><div class="loading-spinner"></div><p id="loadingText">正在处理...</p></div></div><script>const speedList=[{speed:0.7,name:'0'},{speed:0.8,name:'1'},{speed:0.9,name:'2'},{speed:0.95,name:'3'},{speed:1.25,name:'4'}];let chartFileContent='';let audioBuffer=null;let chartFileName='';let audioFileName='';let img1080File=null;let img256File=null;const chartUpload=document.getElementById('chartUpload');const chartInput=document.getElementById('chartInput');const chartFileNameEl=document.getElementById('chartFileName');const audioUpload=document.getElementById('audioUpload');const audioInput=document.getElementById('audioInput');const audioFileNameEl=document.getElementById('audioFileName');const img1080Upload=document.getElementById('img1080Upload');const img1080Input=document.getElementById('img1080Input');const img1080FileNameEl=document.getElementById('img1080FileName');const img256Upload=document.getElementById('img256Upload');const img256Input=document.getElementById('img256Input');const img256FileNameEl=document.getElementById('img256FileName');const processBtn=document.getElementById('processBtn');const status=document.getElementById('status');const autoDetectInput=document.getElementById('autoDetectInput');const autoDetectBtn=document.getElementById('autoDetectBtn');const titleLocalizedContainer=document.getElementById('titleLocalizedContainer');const addTitleLangBtn=document.getElementById('addTitleLangBtn');const loadingOverlay=document.getElementById('loadingOverlay');const loadingText=document.getElementById('loadingText');const fields={id:document.getElementById('fieldId'),artist:document.getElementById('fieldArtist'),bpm:document.getElementById('fieldBpm'),bpmBase:document.getElementById('fieldBpmBase'),set:document.getElementById('fieldSet'),audioPreview:document.getElementById('fieldAudioPreview'),audioPreviewEnd:document.getElementById('fieldAudioPreviewEnd'),side:document.getElementById('fieldSide'),rating:document.getElementById('fieldRating'),bg:document.getElementById('fieldBg'),bgInverse:document.getElementById('fieldBgInverse'),date:document.getElementById('fieldDate'),version:document.getElementById('fieldVersion'),chartDesigner:document.getElementById('fieldChartDesigner'),jacketDesigner:document.getElementById('fieldJacketDesigner'),ratingPlus:document.getElementById('fieldRatingPlus')};function createTitleLocalizedRow(lang,text){const row=document.createElement('div');row.className='title-localized-row';row.innerHTML=`<input type="text"class="title-localized-lang"placeholder="lang"value="${lang || ''}"><input type="text"class="title-localized-text"placeholder="title"value="${text || ''}"><button class="btn-remove"title="remove">×</button>`;row.querySelector('.btn-remove').addEventListener('click',()=>{if(titleLocalizedContainer.children.length>1){row.remove()}});return row}function addTitleLocalized(lang,text){const row=createTitleLocalizedRow(lang,text);titleLocalizedContainer.appendChild(row);if(lang||text)highlightField(row.querySelector('.title-localized-text'))}addTitleLangBtn.addEventListener('click',()=>{addTitleLocalized()});addTitleLocalized('en','');function getTitleLocalized(){const result={};const rows=titleLocalizedContainer.querySelectorAll('.title-localized-row');rows.forEach(row=>{const lang=row.querySelector('.title-localized-lang').value.trim();const text=row.querySelector('.title-localized-text').value.trim();if(lang&&text){result[lang]=text}});return result}function setTitleLocalized(titles){if(!titles||typeof titles!=='object')return 0;let count=0;const entries=Object.entries(titles);const existingRows=titleLocalizedContainer.querySelectorAll('.title-localized-row');const existingLangs=new Map();existingRows.forEach(row=>{const langInput=row.querySelector('.title-localized-lang');const textInput=row.querySelector('.title-localized-text');if(langInput.value.trim()){existingLangs.set(langInput.value.trim(),{langInput,textInput,row})}});entries.forEach(([lang,text])=>{if(!lang||!text)return;const strText=String(text);if(existingLangs.has(lang)){const existing=existingLangs.get(lang);if(!existing.textInput.value){existing.textInput.value=strText;highlightField(existing.textInput);count++}}else{const emptyRow=Array.from(existingRows).find(r=>{const li=r.querySelector('.title-localized-lang');const ti=r.querySelector('.title-localized-text');return!li.value.trim()&&!ti.value.trim()});if(emptyRow){emptyRow.querySelector('.title-localized-lang').value=lang;emptyRow.querySelector('.title-localized-text').value=strText;highlightField(emptyRow.querySelector('.title-localized-text'));count++}else{addTitleLocalized(lang,strText);count++}}});return count}chartUpload.addEventListener('click',()=>chartInput.click());chartUpload.addEventListener('dragover',(e)=>{e.preventDefault();chartUpload.classList.add('dragover')});chartUpload.addEventListener('dragleave',()=>chartUpload.classList.remove('dragover'));chartUpload.addEventListener('drop',(e)=>{e.preventDefault();chartUpload.classList.remove('dragover');if(e.dataTransfer.files.length)handleChartFile(e.dataTransfer.files[0])});chartInput.addEventListener('change',(e)=>{if(e.target.files.length)handleChartFile(e.target.files[0])});audioUpload.addEventListener('click',()=>audioInput.click());audioUpload.addEventListener('dragover',(e)=>{e.preventDefault();audioUpload.classList.add('dragover')});audioUpload.addEventListener('dragleave',()=>audioUpload.classList.remove('dragover'));audioUpload.addEventListener('drop',(e)=>{e.preventDefault();audioUpload.classList.remove('dragover');if(e.dataTransfer.files.length)handleAudioFile(e.dataTransfer.files[0])});audioInput.addEventListener('change',(e)=>{if(e.target.files.length)handleAudioFile(e.target.files[0])});function setupImgUpload(uploadEl,inputEl,nameEl,setter){uploadEl.addEventListener('click',()=>inputEl.click());uploadEl.addEventListener('dragover',(e)=>{e.preventDefault();uploadEl.classList.add('dragover')});uploadEl.addEventListener('dragleave',()=>uploadEl.classList.remove('dragover'));uploadEl.addEventListener('drop',(e)=>{e.preventDefault();uploadEl.classList.remove('dragover');if(e.dataTransfer.files.length){setter(e.dataTransfer.files[0]);nameEl.textContent=e.dataTransfer.files[0].name;uploadEl.classList.add('has-file')}});inputEl.addEventListener('change',(e)=>{if(e.target.files.length){setter(e.target.files[0]);nameEl.textContent=e.target.files[0].name;uploadEl.classList.add('has-file')}})}setupImgUpload(img1080Upload,img1080Input,img1080FileNameEl,(f)=>img1080File=f);setupImgUpload(img256Upload,img256Input,img256FileNameEl,(f)=>img256File=f);function handleChartFile(file){chartFileName=file.name;chartFileNameEl.textContent=file.name;chartUpload.classList.add('has-file');checkProcessReady();showStatus('谱面文件读取中...','info');const reader=new FileReader();reader.onload=(e)=>{chartFileContent=e.target.result;checkProcessReady();showStatus('谱面文件读取成功','success')};reader.onerror=()=>showStatus('谱面文件读取失败','error');reader.readAsText(file)}async function handleAudioFile(file){audioFileName=file.name;audioFileNameEl.textContent=file.name;audioUpload.classList.add('has-file');checkProcessReady();showStatus('音频文件读取中...','info');try{if(!window.audioContext){window.audioContext=new(window.AudioContext||window.webkitAudioContext)()}const arrayBuffer=await file.arrayBuffer();audioBuffer=await window.audioContext.decodeAudioData(arrayBuffer);checkProcessReady();showStatus('音频文件读取成功','success')}catch(error){audioBuffer=null;checkProcessReady();showStatus('音频文件读取失败: '+error.message,'error');console.error(error)}}function checkProcessReady(){processBtn.disabled=!chartFileContent||!audioBuffer}function showStatus(message,type){status.textContent=message;status.className='status '+type}function highlightField(field){if(!field)return;field.classList.add('field-highlight');setTimeout(()=>field.classList.remove('field-highlight'),1000)}function setFieldValue(fieldKey,value){const field=fields[fieldKey];if(!field||!value)return false;const stringValue=String(value);if(field.type==='checkbox'){if(stringValue==='true'||stringValue==='1'||value===true){field.checked=true;highlightField(field);return true}return false}if(!field.value){field.value=stringValue;highlightField(field);return true}return false}function parseJsonAutoDetect(text){try{const json=JSON.parse(text);let detectedCount=0;detectedCount+=setFieldValue('id',json.id)?1:0;detectedCount+=setFieldValue('artist',json.artist)?1:0;detectedCount+=setFieldValue('bpm',json.bpm)?1:0;detectedCount+=setFieldValue('bpmBase',json.bpm_base)?1:0;detectedCount+=setFieldValue('set',json.set)?1:0;detectedCount+=setFieldValue('audioPreview',json.audioPreview)?1:0;detectedCount+=setFieldValue('audioPreviewEnd',json.audioPreviewEnd)?1:0;detectedCount+=setFieldValue('side',json.side)?1:0;detectedCount+=setFieldValue('bg',json.bg)?1:0;detectedCount+=setFieldValue('bgInverse',json.bg_inverse)?1:0;detectedCount+=setFieldValue('date',json.date)?1:0;detectedCount+=setFieldValue('version',json.version)?1:0;detectedCount+=setFieldValue('chartDesigner',json.chartDesigner)?1:0;detectedCount+=setFieldValue('jacketDesigner',json.jacketDesigner)?1:0;detectedCount+=setFieldValue('rating',json.rating)?1:0;detectedCount+=setFieldValue('ratingPlus',json.ratingPlus)?1:0;if(json.title_localized){detectedCount+=setTitleLocalized(json.title_localized)}return detectedCount}catch(e){return-1}}function parseTextAutoDetect(text){let detectedCount=0;const patterns={id:/["']id["']\s*[:=]\s*["']([^"']+)["']/i,artist:/["']artist["']\s*[:=]\s*["']([^"']+)["']/i,bpm:/["']bpm["']\s*[:=]\s*["']([^"']+)["']/i,bpmBase:/["']bpm_base["']\s*[:=]\s*(\d+)/i,set:/["']set["']\s*[:=]\s*["']([^"']+)["']/i,side:/["']side["']\s*[:=]\s*(\d+)/i,bg:/["']bg["']\s*[:=]\s*["']([^"']+)["']/i,bgInverse:/["']bg_inverse["']\s*[:=]\s*["']([^"']+)["']/i,version:/["']version["']\s*[:=]\s*["']([^"']+)["']/i,chartDesigner:/["']chartDesigner["']\s*[:=]\s*["']([^"']+)["']/i,jacketDesigner:/["']jacketDesigner["']\s*[:=]\s*["']([^"']+)["']/i,rating:/["']rating["']\s*[:=]\s*(\d+)/i,ratingPlus:/["']ratingPlus["']\s*[:=]\s*(true|false)/i,audioPreview:/["']audioPreview["']\s*[:=]\s*(\d+)/i,audioPreviewEnd:/["']audioPreviewEnd["']\s*[:=]\s*(\d+)/i,date:/["']date["']\s*[:=]\s*(\d+)/i};for(const[key,pattern]of Object.entries(patterns)){const match=text.match(pattern);if(match){let fieldKey=key;if(key==='bpmBase')fieldKey='bpmBase';if(key==='bgInverse')fieldKey='bgInverse';if(key==='ratingPlus'){detectedCount+=setFieldValue(fieldKey,match[1]==='true')?1:0}else{detectedCount+=setFieldValue(fieldKey,match[1])?1:0}}}const titleMatch=text.match(/["']title_localized["']\s*[:=]\s*\{([\s\S]*?)\}/i);if(titleMatch){const titleBlock=titleMatch[1];const langPattern=/["']([a-z]{2,})["']\s*[:=]\s*["']([^"']+)["']/gi;const titles={};let m;while((m=langPattern.exec(titleBlock))!==null){titles[m[1]]=m[2]}if(Object.keys(titles).length>0){detectedCount+=setTitleLocalized(titles)}}return detectedCount}autoDetectBtn.addEventListener('click',()=>{const text=autoDetectInput.value.trim();if(!text){showStatus('请先输入或粘贴内容','error');return}let detectedCount=parseJsonAutoDetect(text);if(detectedCount===-1){detectedCount=parseTextAutoDetect(text)}if(detectedCount>0){showStatus(`✅已识别并填充${detectedCount}个字段`,'success')}else if(detectedCount===0){showStatus('未识别到任何字段，请手动填写','info')}else{showStatus('无法解析内容，请检查格式','error')}});function validateRequiredFields(){const errors=[];if(!fields.id.value.trim())errors.push('id');if(!fields.bpm.value.trim())errors.push('bpm');if(!fields.bpmBase.value.trim())errors.push('bpm_base');if(!fields.set.value.trim())errors.push('set');if(!fields.rating.value.trim())errors.push('rating');if(!fields.version.value.trim())errors.push('version');const titleLocalized=getTitleLocalized();if(Object.keys(titleLocalized).length===0)errors.push('title_localized');return errors}function multiplyBpm(bpmStr,factor){const parts=bpmStr.split('-');return parts.map(p=>(parseFloat(p)*factor).toFixed(1)).join('-')}function generateSonglist(){const titleLocalized=getTitleLocalized();const bpmStr=fields.bpm.value.trim();const bpmBase=parseFloat(fields.bpmBase.value);const difficulties=speedList.map(({speed,name})=>{const diffTitleLocalized={};for(const[lang,title]of Object.entries(titleLocalized)){diffTitleLocalized[lang]=title+' '+speed}return{ratingClass:parseInt(name),title_localized:diffTitleLocalized,bpm:multiplyBpm(bpmStr,speed),bpm_base:parseFloat((bpmBase*speed).toFixed(1)),audioOverride:true,chartDesigner:fields.chartDesigner.value.trim(),jacketDesigner:fields.jacketDesigner.value.trim(),rating:parseInt(fields.rating.value),ratingPlus:fields.ratingPlus.checked}});return{id:fields.id.value.trim(),title_localized:titleLocalized,artist:fields.artist.value.trim(),bpm:bpmStr,bpm_base:bpmBase,set:fields.set.value.trim(),purchase:'',audioPreview:fields.audioPreview.value?parseInt(fields.audioPreview.value):0,audioPreviewEnd:fields.audioPreviewEnd.value?parseInt(fields.audioPreviewEnd.value):0,side:fields.side.value?parseInt(fields.side.value):1,bg:fields.bg.value.trim()||'prelude_conflict',bg_inverse:fields.bgInverse.value.trim()||'prelude_light',date:fields.date.value?parseInt(fields.date.value):0,version:fields.version.value.trim(),difficulties:difficulties}}processBtn.addEventListener('click',async()=>{if(!chartFileContent||!audioBuffer){showStatus('请先上传谱面和音频文件','error');return}const errors=validateRequiredFields();if(errors.length>0){showStatus('以下字段不能为空: '+errors.join(', '),'error');return}loadingOverlay.classList.add('show');loadingText.textContent='正在处理...';try{const zip=new JSZip();const channelsData=[];for(let ch=0;ch<audioBuffer.numberOfChannels;ch++){channelsData.push(audioBuffer.getChannelData(ch))}loadingText.textContent='处理谱面...';for(const{speed,name}of speedList){const processedChart=ChartProcessor.processAffStrict(chartFileContent,speed);zip.file(`${name}.aff`,processedChart)}loadingText.textContent='并行处理音频...';const audioPromises=speedList.map(({speed,name})=>{return processAudioInWorker(channelsData,audioBuffer.sampleRate,audioBuffer.numberOfChannels,speed).then(result=>({name,result}))});const audioResults=await Promise.all(audioPromises);loadingText.textContent='编码 OGG...';for(const{name,result}of audioResults){const oggBlob=await encodeToOggFromChannels(result.channels,result.sampleRate,result.numChannels);zip.file(`${name}.ogg`,oggBlob)}loadingText.textContent='正在生成 songlist...';const songlist=generateSonglist();zip.file('songlist.txt',JSON.stringify(songlist,null,4));if(img1080File){zip.file('1080_base.jpg',img1080File)}if(img256File){zip.file('1080_base_256.jpg',img256File)}loadingText.textContent='正在打包 ZIP...';const zipBlob=await zip.generateAsync({type:'blob'});const url=URL.createObjectURL(zipBlob);const a=document.createElement('a');const idValue=fields.id.value.trim()||'output';a.download=`${idValue}_processed.zip`;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);loadingOverlay.classList.remove('show');showStatus('处理完成，ZIP 已下载','success')}catch(error){loadingOverlay.classList.remove('show');showStatus('处理失败: '+error.message,'error');console.error(error)}});function processAudioInWorker(channelsData,sampleRate,numChannels,playbackRate){return new Promise((resolve,reject)=>{const worker=new Worker('audio-worker.js');worker.addEventListener('message',(e)=>{if(e.data.type==='done'){worker.terminate();resolve(e.data.result)}else if(e.data.type==='error'){worker.terminate();reject(new Error(e.data.message))}});worker.addEventListener('error',(e)=>{worker.terminate();reject(new Error(e.message))});worker.postMessage({sampleRate,numChannels,channelsData,playbackRate})})}async function encodeToOgg(audioBuffer){const channels=[];for(let ch=0;ch<audioBuffer.numberOfChannels;ch++){channels.push(audioBuffer.getChannelData(ch))}return encodeToOggFromChannels(channels,audioBuffer.sampleRate,audioBuffer.numberOfChannels)}async function encodeToOggFromChannels(channels,sampleRate,numChannels){const length=channels[0].length;const encoder=await WasmMediaEncoder.createOggEncoder();encoder.configure({sampleRate:sampleRate,channels:numChannels,vbrQuality:5,});const chunkSize=4096;let outBuffers=[];let totalLength=0;for(let offset=0;offset<length;offset+=chunkSize){const chunkLen=Math.min(chunkSize,length-offset);const chunkChannels=[];for(let ch=0;ch<numChannels;ch++){chunkChannels.push(channels[ch].subarray(offset,offset+chunkLen))}const encoded=encoder.encode(chunkChannels);if(encoded.length>0){const copy=new Uint8Array(encoded);outBuffers.push(copy);totalLength+=copy.length}}const finalData=encoder.finalize();if(finalData.length>0){const copy=new Uint8Array(finalData);outBuffers.push(copy);totalLength+=copy.length}const result=new Uint8Array(totalLength);let pos=0;for(const buf of outBuffers){result.set(buf,pos);pos+=buf.length}return new Blob([result],{type:'audio/ogg'})}</script></body></html>
