<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>曲目剪辑生成</title><script src="chart-cut-processor-core.js"></script><script src="https://unpkg.com/jszip@3/dist/jszip.min.js"></script><script src="https://unpkg.com/wasm-media-encoders@0.7.0/dist/umd/WasmMediaEncoder.min.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:40px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto}h1{color:#333;font-size:24px;margin-bottom:8px;text-align:center}.subtitle{color:#666;font-size:14px;text-align:center;margin-bottom:32px}.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px}input[type="text"],input[type="number"]{width:100%;padding:10px 12px;border:2px solid#ddd;border-radius:6px;font-size:14px;transition:border-color 0.3s ease}input[type="text"]:focus,input[type="number"]:focus{outline:none;border-color:#667eea}input[type="checkbox"]{width:18px;height:18px;cursor:pointer}.checkbox-label{display:flex;align-items:center;gap:8px}.auto-detect-section{background:#f9f9ff;border-radius:8px;padding:16px;margin-top:8px}.auto-detect-textarea{width:100%;min-height:100px;padding:10px;border:1px solid#ddd;border-radius:6px;font-family:monospace;font-size:12px;resize:vertical;margin-bottom:8px}.btn-secondary{background:#f0f0f0;color:#333}.btn-secondary:hover{background:#e0e0e0}.btn-small{padding:8px 16px;font-size:14px}.field-highlight{animation:highlight 1s ease}@keyframes highlight{0%{background-color:#fef3c7}100%{background-color:transparent}}.title-localized-row{display:grid;grid-template-columns:80px 1fr 32px;gap:8px;align-items:center;margin-bottom:8px}.title-localized-lang{width:100%}.title-localized-text{width:100%;min-width:0}.btn-remove{width:32px;height:32px;padding:0;border:none;background:#fee2e2;color:#ef4444;border-radius:6px;cursor:pointer;font-size:16px;line-height:32px;text-align:center}.btn-remove:hover{background:#fecaca}.btn-add{width:auto;padding:6px 16px;font-size:13px;background:#f0f0f0;color:#333;border:none;border-radius:6px;cursor:pointer;margin-top:4px}.btn-add:hover{background:#e0e0e0}.form-group{margin-bottom:24px}label{display:block;color:#333;font-weight:600;margin-bottom:8px;font-size:14px}.file-upload{border:2px dashed#ddd;border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.3s ease}.file-upload:hover{border-color:#667eea;background:#f8f9ff}.file-upload.dragover{border-color:#667eea;background:#f0f2ff}.file-upload.has-file{border-color:#10b981;background:#f0fdf4}.file-icon{font-size:40px;margin-bottom:12px}.file-text{color:#666;font-size:14px}.file-name{color:#667eea;font-weight:600;margin-top:8px;word-break:break-all}input[type="file"]{display:none}.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s ease}.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,0.4)}.btn-primary:disabled{opacity:0.5;cursor:not-allowed}.status{text-align:center;margin-top:20px;font-size:14px;min-height:20px}.status.success{color:#10b981}.status.error{color:#ef4444}.status.info{color:#667eea}.player-section{margin-bottom:30px}audio{width:100%;margin-bottom:10px}.current-time{text-align:center;font-family:monospace;color:#666;font-size:14px;margin-bottom:20px}.add-segment-form{background:#f8f9ff;border-radius:15px;padding:25px;margin-bottom:30px;border:2px solid#e8eaf0}.form-row-segment{display:flex;gap:15px;align-items:center;flex-wrap:wrap;margin-bottom:15px}.form-group-segment{display:flex;align-items:center;gap:10px}.form-group-segment label{color:#555;font-weight:500;min-width:80px}.form-group-segment input{padding:10px 15px;border:2px solid#ddd;border-radius:8px;font-family:monospace;font-size:14px;width:140px;transition:border-color 0.2s}.form-group-segment input:focus{outline:none;border-color:#667eea}.paste-btn{padding:8px 12px;background:#2196f3;color:white;border:none;border-radius:6px;font-size:12px;cursor:pointer;transition:background 0.2s}.paste-btn:hover{background:#1976d2}.preview-controls{display:flex;gap:10px;margin-top:15px;padding-top:15px;border-top:1px solid#e0e0e0}.preview-btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.2s}.preview-btn.start{background:#4caf50;color:white}.preview-btn.start:hover{background:#43a047}.preview-btn.end{background:#ff9800;color:white}.preview-btn.end:hover{background:#f57c00}.preview-btn:disabled{opacity:0.5;cursor:not-allowed}.btn-submit{padding:12px 30px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:25px;font-size:14px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}.btn-submit:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,0.4)}.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}.controls-section{display:flex;gap:15px;justify-content:center;margin-bottom:30px;flex-wrap:wrap}.control-btn{padding:12px 25px;border:none;border-radius:25px;font-size:14px;cursor:pointer;transition:all 0.2s}.control-btn.primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}.control-btn.primary:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,0.4)}.control-btn.primary:disabled{opacity:0.5;cursor:not-allowed}.control-btn.danger{background:#ff4757;color:white}.control-btn.danger:hover{background:#ff6b7a}.segments-list{margin-bottom:30px}.segments-list h3{color:#333;margin-bottom:15px;font-size:18px}.segment-item{display:flex;align-items:center;justify-content:space-between;padding:15px;background:#f8f9ff;border-radius:10px;margin-bottom:10px;border-left:4px solid#667eea}.segment-info{display:flex;align-items:center;gap:15px}.segment-number{width:30px;height:30px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}.segment-time{color:#333;font-family:monospace}.segment-actions{display:flex;gap:10px}.action-btn{padding:8px 15px;border:none;border-radius:15px;font-size:12px;cursor:pointer;transition:all 0.2s}.action-btn.play{background:#2ed573;color:white}.action-btn.play:hover{background:#1dd16f}.action-btn.delete{background:#ff6b6b;color:white}.action-btn.delete:hover{background:#ff5252}.action-btn.preview-start{background:#4caf50;color:white}.action-btn.preview-start:hover{background:#43a047}.action-btn.preview-end{background:#ff9800;color:white}.action-btn.preview-end:hover{background:#f57c00}.segment-count{text-align:center;color:#666;font-size:14px;margin-bottom:15px}</style></head><body><div class="container"><h1>🎵曲目剪辑生成</h1><p class="subtitle">上传谱面、音频和封面图，生成剪辑后的歌曲文件夹</p><!--谱面上传--><div class="form-group"><label>chart</label><div class="file-upload"id="chartUpload"><div class="file-icon">📄</div><div class="file-text">点击或拖拽谱面文件到此处</div><div class="file-name"id="chartFileName"></div></div><input type="file"id="chartInput"accept=".aff,.txt,*"></div><!--音频上传--><div class="form-group"><label>audio</label><div class="file-upload"id="audioUpload"><div class="file-icon">🎵</div><div class="file-text">点击或拖拽音频文件到此处</div><div class="file-name"id="audioFileName"></div></div><input type="file"id="audioInput"accept="audio/*"></div><!--封面图上传--><div class="form-row"><div class="form-group"><label>1080_base.jpg(可选)</label><div class="file-upload"id="img1080Upload"><div class="file-icon">🖼️</div><div class="file-text">点击或拖拽图片</div><div class="file-name"id="img1080FileName"></div></div><input type="file"id="img1080Input"accept="image/*"></div><div class="form-group"><label>1080_base_256.jpg(可选)</label><div class="file-upload"id="img256Upload"><div class="file-icon">🖼️</div><div class="file-text">点击或拖拽图片</div><div class="file-name"id="img256FileName"></div></div><input type="file"id="img256Input"accept="image/*"></div></div><!--song info--><div class="form-group"><label>song info</label><div class="form-row"><div><label style="font-weight: 400; font-size: 12px; color: #888;">id</label><input type="text"id="fieldId"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">artist</label><input type="text"id="fieldArtist"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">bpm</label><input type="text"id="fieldBpm"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">bpm_base</label><input type="number"id="fieldBpmBase"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">set</label><input type="text"id="fieldSet"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">audioPreview</label><input type="number"id="fieldAudioPreview"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">audioPreviewEnd</label><input type="number"id="fieldAudioPreviewEnd"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">side</label><input type="number"id="fieldSide"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">rating</label><input type="number"id="fieldRating"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">bg</label><input type="text"id="fieldBg"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">bg_inverse</label><input type="text"id="fieldBgInverse"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">date</label><input type="number"id="fieldDate"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">version</label><input type="text"id="fieldVersion"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">chartDesigner</label><input type="text"id="fieldChartDesigner"></div><div><label style="font-weight: 400; font-size: 12px; color: #888;">jacketDesigner</label><input type="text"id="fieldJacketDesigner"></div></div><div class="form-row"style="margin-top: 8px;"><div class="checkbox-label"><input type="checkbox"id="fieldRatingPlus"><label style="font-weight: 400; font-size: 13px;">ratingPlus</label></div></div><div style="margin-top: 12px;"><label style="font-weight: 400; font-size: 12px; color: #888;">title_localized</label><div id="titleLocalizedContainer"></div><button class="btn-add"id="addTitleLangBtn">+add language</button></div><div class="auto-detect-section"><label style="font-weight: 400; font-size: 13px; color: #667eea;">📋auto detect</label><textarea class="auto-detect-textarea"id="autoDetectInput"placeholder="paste JSON or text here..."></textarea><button class="btn btn-secondary btn-small"id="autoDetectBtn">auto fill</button></div></div><!--音频播放器--><div class="player-section"id="playerSection"style="display: none;"><audio id="audioPlayer"controls><div class="current-time"id="currentTime">当前时间:00:00.00/00:00.00</div></div><!--添加片段表单--><div id="addSegmentForm"style="display: none;"><div class="add-segment-form"><h3>➕添加音频片段</h3><div class="form-row-segment"><div class="form-group-segment"><label>片段名称:</label><input type="text"id="segmentNameInput"placeholder="输入片段名称"maxlength="30"style="width: 180px;"></div></div><div class="form-row-segment"><div class="form-group-segment"><label>开始时间:</label><input type="text"id="startTimeInput"placeholder="00:00.00"maxlength="8"><button class="paste-btn"id="pasteStartBtn">粘贴当前时间</button></div><span style="font-size: 20px; color: #999;">→</span><div class="form-group-segment"><label>结束时间:</label><input type="text"id="endTimeInput"placeholder="00:00.00"maxlength="8"><button class="paste-btn"id="pasteEndBtn">粘贴当前时间</button></div></div><div class="preview-controls"><button class="preview-btn start"id="previewStartBtn"disabled>🎧试听开头(前2秒)</button><button class="preview-btn end"id="previewEndBtn"disabled>🎧试听结尾(后2秒)</button><button class="btn-submit"id="submitSegmentBtn">✅添加片段</button></div></div></div><!--控制按钮--><div class="controls-section"id="controlsSection"style="display: none;"><button class="control-btn primary"id="addSegmentBtn">🎯添加选段</button><button class="control-btn"id="clearBtn">🗑️清空所有片段</button><button class="control-btn"id="exportBtn">📥导出片段信息</button></div><!--片段列表--><div class="segments-list"id="segmentsList"style="display: none;"><h3>已选择的片段<span id="segmentCountBadge">(0/5)</span></h3><div id="segmentsContainer"></div></div><!--状态消息--><div class="status"id="status"></div></div><script>const MAX_SEGMENTS=5;let audioPlayer;let segments=[];let audioDuration=0;let audioBuffer=null;let chartFileContent='';let img1080File=null;let img256File=null;const chartUpload=document.getElementById('chartUpload');const chartInput=document.getElementById('chartInput');const chartFileNameEl=document.getElementById('chartFileName');const audioUpload=document.getElementById('audioUpload');const audioInput=document.getElementById('audioInput');const audioFileNameEl=document.getElementById('audioFileName');const img1080Upload=document.getElementById('img1080Upload');const img1080Input=document.getElementById('img1080Input');const img1080FileNameEl=document.getElementById('img1080FileName');const img256Upload=document.getElementById('img256Upload');const img256Input=document.getElementById('img256Input');const img256FileNameEl=document.getElementById('img256FileName');const playerSection=document.getElementById('playerSection');const currentTimeDisplay=document.getElementById('currentTime');const controlsSection=document.getElementById('controlsSection');const segmentsList=document.getElementById('segmentsList');const segmentsContainer=document.getElementById('segmentsContainer');const segmentCountBadge=document.getElementById('segmentCountBadge');const status=document.getElementById('status');const addSegmentBtn=document.getElementById('addSegmentBtn');const clearBtn=document.getElementById('clearBtn');const exportBtn=document.getElementById('exportBtn');const addSegmentForm=document.getElementById('addSegmentForm');const segmentNameInput=document.getElementById('segmentNameInput');const startTimeInput=document.getElementById('startTimeInput');const endTimeInput=document.getElementById('endTimeInput');const pasteStartBtn=document.getElementById('pasteStartBtn');const pasteEndBtn=document.getElementById('pasteEndBtn');const previewStartBtn=document.getElementById('previewStartBtn');const previewEndBtn=document.getElementById('previewEndBtn');const submitSegmentBtn=document.getElementById('submitSegmentBtn');const autoDetectInput=document.getElementById('autoDetectInput');const autoDetectBtn=document.getElementById('autoDetectBtn');const titleLocalizedContainer=document.getElementById('titleLocalizedContainer');const addTitleLangBtn=document.getElementById('addTitleLangBtn');const fields={id:document.getElementById('fieldId'),artist:document.getElementById('fieldArtist'),bpm:document.getElementById('fieldBpm'),bpmBase:document.getElementById('fieldBpmBase'),set:document.getElementById('fieldSet'),audioPreview:document.getElementById('fieldAudioPreview'),audioPreviewEnd:document.getElementById('fieldAudioPreviewEnd'),side:document.getElementById('fieldSide'),rating:document.getElementById('fieldRating'),bg:document.getElementById('fieldBg'),bgInverse:document.getElementById('fieldBgInverse'),date:document.getElementById('fieldDate'),version:document.getElementById('fieldVersion'),chartDesigner:document.getElementById('fieldChartDesigner'),jacketDesigner:document.getElementById('fieldJacketDesigner'),ratingPlus:document.getElementById('fieldRatingPlus')};function createTitleLocalizedRow(lang,text){const row=document.createElement('div');row.className='title-localized-row';row.innerHTML=`<input type="text"class="title-localized-lang"placeholder="lang"value="${lang || ''}"><input type="text"class="title-localized-text"placeholder="title"value="${text || ''}"><button class="btn-remove"title="remove">×</button>`;row.querySelector('.btn-remove').addEventListener('click',()=>{if(titleLocalizedContainer.children.length>1){row.remove()}});return row}function addTitleLocalized(lang,text){const row=createTitleLocalizedRow(lang,text);titleLocalizedContainer.appendChild(row);if(lang||text)highlightField(row.querySelector('.title-localized-text'))}addTitleLangBtn.addEventListener('click',()=>{addTitleLocalized()});addTitleLocalized('en','');function getTitleLocalized(){const result={};const rows=titleLocalizedContainer.querySelectorAll('.title-localized-row');rows.forEach(row=>{const lang=row.querySelector('.title-localized-lang').value.trim();const text=row.querySelector('.title-localized-text').value.trim();if(lang&&text){result[lang]=text}});return result}function setTitleLocalized(titles){if(!titles||typeof titles!=='object')return 0;let count=0;const entries=Object.entries(titles);const existingRows=titleLocalizedContainer.querySelectorAll('.title-localized-row');const existingLangs=new Map();existingRows.forEach(row=>{const langInput=row.querySelector('.title-localized-lang');const textInput=row.querySelector('.title-localized-text');if(langInput.value.trim()){existingLangs.set(langInput.value.trim(),{langInput,textInput,row})}});entries.forEach(([lang,text])=>{if(!lang||!text)return;const strText=String(text);if(existingLangs.has(lang)){const existing=existingLangs.get(lang);if(!existing.textInput.value){existing.textInput.value=strText;highlightField(existing.textInput);count++}}else{const emptyRow=Array.from(existingRows).find(r=>{const li=r.querySelector('.title-localized-lang');const ti=r.querySelector('.title-localized-text');return!li.value.trim()&&!ti.value.trim()});if(emptyRow){emptyRow.querySelector('.title-localized-lang').value=lang;emptyRow.querySelector('.title-localized-text').value=strText;highlightField(emptyRow.querySelector('.title-localized-text'));count++}else{addTitleLocalized(lang,strText);count++}}});return count}function highlightField(field){if(!field)return;field.classList.add('field-highlight');setTimeout(()=>field.classList.remove('field-highlight'),1000)}function setFieldValue(fieldKey,value){const field=fields[fieldKey];if(!field||!value)return false;const stringValue=String(value);if(field.type==='checkbox'){if(stringValue==='true'||stringValue==='1'||value===true){field.checked=true;highlightField(field);return true}return false}if(!field.value){field.value=stringValue;highlightField(field);return true}return false}function parseJsonAutoDetect(text){try{const json=JSON.parse(text);let detectedCount=0;detectedCount+=setFieldValue('id',json.id)?1:0;detectedCount+=setFieldValue('artist',json.artist)?1:0;detectedCount+=setFieldValue('bpm',json.bpm)?1:0;detectedCount+=setFieldValue('bpmBase',json.bpm_base)?1:0;detectedCount+=setFieldValue('set',json.set)?1:0;detectedCount+=setFieldValue('audioPreview',json.audioPreview)?1:0;detectedCount+=setFieldValue('audioPreviewEnd',json.audioPreviewEnd)?1:0;detectedCount+=setFieldValue('side',json.side)?1:0;detectedCount+=setFieldValue('rating',json.rating)?1:0;detectedCount+=setFieldValue('bg',json.bg)?1:0;detectedCount+=setFieldValue('bgInverse',json.bg_inverse)?1:0;detectedCount+=setFieldValue('date',json.date)?1:0;detectedCount+=setFieldValue('version',json.version)?1:0;detectedCount+=setFieldValue('chartDesigner',json.chartDesigner)?1:0;detectedCount+=setFieldValue('jacketDesigner',json.jacketDesigner)?1:0;detectedCount+=setFieldValue('ratingPlus',json.ratingPlus)?1:0;if(json.title_localized){detectedCount+=setTitleLocalized(json.title_localized)}return detectedCount}catch(e){return-1}}function parseTextAutoDetect(text){let detectedCount=0;const patterns={id:/["']id["']\s*[:=]\s*["']([^"']+)["']/i,artist:/["']artist["']\s*[:=]\s*["']([^"']+)["']/i,bpm:/["']bpm["']\s*[:=]\s*["']([^"']+)["']/i,bpmBase:/["']bpm_base["']\s*[:=]\s*(\d+)/i,set:/["']set["']\s*[:=]\s*["']([^"']+)["']/i,audioPreview:/["']audioPreview["']\s*[:=]\s*(\d+)/i,audioPreviewEnd:/["']audioPreviewEnd["']\s*[:=]\s*(\d+)/i,side:/["']side["']\s*[:=]\s*(\d+)/i,bg:/["']bg["']\s*[:=]\s*["']([^"']+)["']/i,bgInverse:/["']bg_inverse["']\s*[:=]\s*["']([^"']+)["']/i,date:/["']date["']\s*[:=]\s*(\d+)/i,version:/["']version["']\s*[:=]\s*["']([^"']+)["']/i,chartDesigner:/["']chartDesigner["']\s*[:=]\s*["']([^"']+)["']/i,jacketDesigner:/["']jacketDesigner["']\s*[:=]\s*["']([^"']+)["']/i,rating:/["']rating["']\s*[:=]\s*(\d+)/i,ratingPlus:/["']ratingPlus["']\s*[:=]\s*(true|false)/i};for(const[key,pattern]of Object.entries(patterns)){const match=text.match(pattern);if(match){if(key==='ratingPlus'){detectedCount+=setFieldValue(key,match[1]==='true')?1:0}else{detectedCount+=setFieldValue(key,match[1])?1:0}}}const titleMatch=text.match(/["']title_localized["']\s*[:=]\s*\{([\s\S]*?)\}/i);if(titleMatch){const titleBlock=titleMatch[1];const langPattern=/["']([a-z]{2,})["']\s*[:=]\s*["']([^"']+)["']/gi;const titles={};let m;while((m=langPattern.exec(titleBlock))!==null){titles[m[1]]=m[2]}if(Object.keys(titles).length>0){detectedCount+=setTitleLocalized(titles)}}return detectedCount}autoDetectBtn.addEventListener('click',()=>{const text=autoDetectInput.value.trim();if(!text){showStatus('请先输入或粘贴内容','error');return}let detectedCount=parseJsonAutoDetect(text);if(detectedCount===-1){detectedCount=parseTextAutoDetect(text)}if(detectedCount>0){showStatus(`✅已识别并填充${detectedCount}个字段`,'success')}else if(detectedCount===0){showStatus('未识别到任何字段，请手动填写','info')}else{showStatus('无法解析内容，请检查格式','error')}});function setupImgUpload(uploadEl,inputEl,nameEl,setter){uploadEl.addEventListener('click',()=>inputEl.click());uploadEl.addEventListener('dragover',(e)=>{e.preventDefault();uploadEl.classList.add('dragover')});uploadEl.addEventListener('dragleave',()=>uploadEl.classList.remove('dragover'));uploadEl.addEventListener('drop',(e)=>{e.preventDefault();uploadEl.classList.remove('dragover');if(e.dataTransfer.files.length){setter(e.dataTransfer.files[0]);nameEl.textContent=e.dataTransfer.files[0].name;uploadEl.classList.add('has-file')}});inputEl.addEventListener('change',(e)=>{if(e.target.files.length){setter(e.target.files[0]);nameEl.textContent=e.target.files[0].name;uploadEl.classList.add('has-file')}})}setupImgUpload(img1080Upload,img1080Input,img1080FileNameEl,(f)=>img1080File=f);setupImgUpload(img256Upload,img256Input,img256FileNameEl,(f)=>img256File=f);function handleChartFile(file){chartFileNameEl.textContent=file.name;chartUpload.classList.add('has-file');showStatus('谱面文件读取中...','info');const reader=new FileReader();reader.onload=(e)=>{chartFileContent=e.target.result;showStatus('谱面文件读取成功','success')};reader.onerror=()=>showStatus('谱面文件读取失败','error');reader.readAsText(file)}async function handleAudioFile(file){audioFileNameEl.textContent=file.name;audioUpload.classList.add('has-file');showStatus('音频文件读取中...','info');try{if(!window.audioContext){window.audioContext=new(window.AudioContext||window.webkitAudioContext)()}const arrayBuffer=await file.arrayBuffer();audioBuffer=await window.audioContext.decodeAudioData(arrayBuffer);audioDuration=audioBuffer.duration;audioPlayer=document.getElementById('audioPlayer');audioPlayer.src=URL.createObjectURL(file);playerSection.style.display='block';controlsSection.style.display='flex';segmentsList.style.display='block';updateCurrentTime();showStatus('音频文件读取成功','success')}catch(error){audioBuffer=null;showStatus('音频文件读取失败: '+error.message,'error');console.error(error)}}chartUpload.addEventListener('click',()=>chartInput.click());chartUpload.addEventListener('dragover',(e)=>{e.preventDefault();chartUpload.classList.add('dragover')});chartUpload.addEventListener('dragleave',()=>chartUpload.classList.remove('d
