<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>音频变速</title><script src="audio-processor-core.js"></script><script src="https://unpkg.com/wasm-media-encoders@0.7.0/dist/umd/WasmMediaEncoder.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:32px;max-width:600px;width:100%}h1{font-size:24px;color:#333;margin-bottom:8px;text-align:center}.subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:24px}.upload-section{border:2px dashed#ddd;border-radius:12px;padding:40px 20px;text-align:center;margin-bottom:24px;cursor:pointer;transition:all 0.3s;background:#fafafa}.upload-section:hover,.upload-section.dragover{border-color:#667eea;background:#f0f2ff}#fileInput{display:none}.file-info{background:#f5f7ff;padding:12px 16px;border-radius:8px;margin-bottom:20px;display:none}.file-info.show{display:block}.file-name{font-weight:600;color:#333;font-size:14px}.file-duration{font-size:12px;color:#888;margin-top:4px}#waveformCanvas{width:100%;height:100px;background:#f5f7ff;border-radius:8px;margin-bottom:20px}.playback-section{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:24px}.play-btn{width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 15px rgba(102,126,234,0.4)}.play-btn:hover{transform:scale(1.05)}.play-btn:disabled{opacity:0.5;cursor:not-allowed}.time-display{font-family:'Courier New',monospace;font-size:14px;color:#555;min-width:100px;text-align:center}.speed-section{background:#f9f9ff;padding:20px;border-radius:12px}.speed-control label{display:flex;justify-content:space-between;font-size:13px;color:#555;margin-bottom:8px}.speed-value{font-weight:600;color:#667eea;font-size:16px}input[type="range"]{width:100%;height:6px;border-radius:3px;background:#e0e0e0;outline:none;-webkit-appearance:none}input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#667eea;cursor:pointer;box-shadow:0 2px 6px rgba(102,126,234,0.4)}.speed-presets{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}.preset-btn{padding:6px 14px;border:1px solid#ddd;background:#fff;border-radius:20px;cursor:pointer;font-size:12px;color:#666;transition:all 0.2s}.preset-btn:hover,.preset-btn.active{border-color:#667eea;background:#f0f2ff;color:#667eea}.process-btn{width:100%;margin-top:16px;padding:12px 24px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 15px rgba(102,126,234,0.4)}.process-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,126,234,0.5)}.process-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}.download-btn{width:100%;margin-top:12px;padding:12px 24px;border:none;background:linear-gradient(135deg,#11998e,#38ef7d);color:white;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 15px rgba(17,153,142,0.4)}.download-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(17,153,142,0.5)}.download-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}.loading-overlay.show{display:flex}.loading-content{background:#fff;padding:24px 48px;border-radius:12px;text-align:center}.loading-spinner{width:40px;height:40px;border:4px solid#f3f3f3;border-top:4px solid#667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="container"><h1>🎵音频变速Demo v2</h1><p class="subtitle">基于SOLA算法的变速不变调效果</p><div class="upload-section"id="uploadSection"><div style="font-size: 48px; color: #999; margin-bottom: 8px;">📁</div><p><strong>点击上传</strong>或拖拽音频文件到这里</p><p style="font-size: 12px; color: #999;">支持MP3,WAV,OGG,M4A等格式</p><input type="file"id="fileInput"accept="audio/*"></div><div class="file-info"id="fileInfo"><div class="file-name"id="fileName">-</div><div class="file-duration"id="fileDuration">时长:-</div></div><canvas id="waveformCanvas"></canvas><div class="playback-section"><button class="play-btn"id="playBtn"disabled>▶</button><div class="time-display"><span id="currentTime">00:00</span>/<span id="totalTime">00:00</span></div></div><div class="speed-section"><div class="speed-control"><label><span>播放速度</span><span class="speed-value"id="speedValue">1.00x</span></label><input type="range"id="speedSlider"min="0.25"max="4"step="0.05"value="1"></div><div class="speed-presets"><button class="preset-btn"data-speed="0.5">0.5x</button><button class="preset-btn"data-speed="0.75">0.75x</button><button class="preset-btn active"data-speed="1">1.0x</button><button class="preset-btn"data-speed="1.25">1.25x</button><button class="preset-btn"data-speed="1.5">1.5x</button><button class="preset-btn"data-speed="2">2.0x</button></div><button class="process-btn"id="processBtn"disabled>开始处理</button><button class="download-btn"id="downloadBtn"disabled>下载OGG</button></div></div><div class="loading-overlay"id="loadingOverlay"><div class="loading-content"><div class="loading-spinner"></div><p>正在处理音频...</p></div></div><script>class AudioPlayer{constructor(){this.audioContext=null;this.sourceBuffer=null;this.processedBuffer=null;this.sourceNode=null;this.isPlaying=false;this.startTime=0;this.pauseTime=0;this.playbackRate=1;this.animationId=null;this.processCache={};this.debounceTimer=null;this.initElements();this.initEventListeners();this.initCanvas()}initElements(){this.uploadSection=document.getElementById('uploadSection');this.fileInput=document.getElementById('fileInput');this.fileInfo=document.getElementById('fileInfo');this.fileName=document.getElementById('fileName');this.fileDuration=document.getElementById('fileDuration');this.playBtn=document.getElementById('playBtn');this.currentTimeEl=document.getElementById('currentTime');this.totalTimeEl=document.getElementById('totalTime');this.speedSlider=document.getElementById('speedSlider');this.speedValue=document.getElementById('speedValue');this.processBtn=document.getElementById('processBtn');this.downloadBtn=document.getElementById('downloadBtn');this.waveformCanvas=document.getElementById('waveformCanvas');this.waveformCtx=this.waveformCanvas.getContext('2d');this.loadingOverlay=document.getElementById('loadingOverlay')}initCanvas(){const dpr=window.devicePixelRatio||1;const rect=this.waveformCanvas.getBoundingClientRect();this.waveformCanvas.width=rect.width*dpr;this.waveformCanvas.height=rect.height*dpr;this.waveformCtx.scale(dpr,dpr);this.canvasWidth=rect.width;this.canvasHeight=rect.height;this.drawEmptyWaveform()}drawEmptyWaveform(){this.waveformCtx.clearRect(0,0,this.canvasWidth,this.canvasHeight);this.waveformCtx.strokeStyle='#ddd';this.waveformCtx.lineWidth=1;this.waveformCtx.setLineDash([5,5]);this.waveformCtx.beginPath();this.waveformCtx.moveTo(0,this.canvasHeight/2);this.waveformCtx.lineTo(this.canvasWidth,this.canvasHeight/2);this.waveformCtx.stroke();this.waveformCtx.setLineDash([]);this.waveformCtx.fillStyle='#bbb';this.waveformCtx.font='12px sans-serif';this.waveformCtx.textAlign='center';this.waveformCtx.fillText('上传音频后显示波形',this.canvasWidth/2,this.canvasHeight/2+20)}drawWaveform(buffer){const ctx=this.waveformCtx;const width=this.canvasWidth;const height=this.canvasHeight;ctx.clearRect(0,0,width,height);const data=buffer.getChannelData(0);const step=Math.ceil(data.length/width);const amp=height/2;ctx.fillStyle='#667eea';ctx.globalAlpha=0.6;for(let i=0;i<width;i++){let min=1.0;let max=-1.0;for(let j=0;j<step;j++){const datum=data[(i*step)+j];if(datum<min)min=datum;if(datum>max)max=datum}const y1=(1+min)*amp;const y2=(1+max)*amp;ctx.fillRect(i,y1,1,Math.max(1,y2-y1))}ctx.globalAlpha=1;ctx.strokeStyle='rgba(0, 0, 0, 0.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,height/2);ctx.lineTo(width,height/2);ctx.stroke()}drawPlayhead(progress){if(!this.sourceBuffer)return;this.drawWaveform(this.sourceBuffer);const x=progress*this.canvasWidth;this.waveformCtx.strokeStyle='#ff4757';this.waveformCtx.lineWidth=2;this.waveformCtx.beginPath();this.waveformCtx.moveTo(x,0);this.waveformCtx.lineTo(x,this.canvasHeight);this.waveformCtx.stroke()}initEventListeners(){this.uploadSection.addEventListener('click',()=>this.fileInput.click());this.fileInput.addEventListener('change',(e)=>this.handleFile(e.target.files[0]));this.uploadSection.addEventListener('dragover',(e)=>{e.preventDefault();this.uploadSection.classList.add('dragover')});this.uploadSection.addEventListener('dragleave',()=>{this.uploadSection.classList.remove('dragover')});this.uploadSection.addEventListener('drop',(e)=>{e.preventDefault();this.uploadSection.classList.remove('dragover');const file=e.dataTransfer.files[0];if(file&&file.type.startsWith('audio/')){this.handleFile(file)}});this.playBtn.addEventListener('click',()=>this.togglePlay());this.processBtn.addEventListener('click',()=>this.processAudio());this.downloadBtn.addEventListener('click',()=>this.downloadOgg());this.speedSlider.addEventListener('input',(e)=>{const speed=parseFloat(e.target.value);this.setSpeed(speed)});document.querySelectorAll('.preset-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const speed=parseFloat(btn.dataset.speed);this.speedSlider.value=speed;this.setSpeed(speed)})});window.addEventListener('resize',()=>{this.initCanvas();if(this.sourceBuffer){this.drawWaveform(this.sourceBuffer)}})}async handleFile(file){if(!file)return;this.fileName.textContent=file.name;this.fileInfo.classList.add('show');if(!this.audioContext){this.audioContext=new(window.AudioContext||window.webkitAudioContext)()}try{const arrayBuffer=await file.arrayBuffer();this.sourceBuffer=await this.audioContext.decodeAudioData(arrayBuffer);const duration=this.sourceBuffer.duration;this.fileDuration.textContent=`时长:${this.formatTime(duration)}`;this.totalTimeEl.textContent=this.formatTime(duration);this.drawWaveform(this.sourceBuffer);this.playBtn.disabled=false;this.processBtn.disabled=false;this.downloadBtn.disabled=true;this.processCache={};this.processedBuffer=null}catch(err){alert('音频文件加载失败: '+err.message);console.error(err)}}setSpeed(speed){this.playbackRate=speed;this.speedValue.textContent=speed.toFixed(2)+'x';this.processedBuffer=null}async processAudio(){if(!this.sourceBuffer)return;const cacheKey=this.playbackRate.toString();if(this.processCache[cacheKey]){this.processedBuffer=this.processCache[cacheKey];return}this.loadingOverlay.classList.add('show');await new Promise(resolve=>setTimeout(resolve,50));try{const processed=AudioProcessor.process(this.sourceBuffer,this.playbackRate);this.processedBuffer=processed;this.processCache[cacheKey]=processed;this.downloadBtn.disabled=false;alert('处理完成，现在可以点击播放试听或下载 OGG')}catch(err){console.error('Audio processing error:',err);this.downloadBtn.disabled=true;alert('处理失败: '+err.message)}finally{this.loadingOverlay.classList.remove('show')}}async downloadOgg(){if(!this.processedBuffer)return;this.loadingOverlay.classList.add('show');try{const blob=await this.encodeToOgg(this.processedBuffer);const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`processed_${this.playbackRate.toFixed(2)}x.ogg`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}catch(err){console.error('OGG encoding error:',err);alert('OGG 导出失败: '+err.message)}finally{this.loadingOverlay.classList.remove('show')}}async encodeToOgg(audioBuffer){const sampleRate=audioBuffer.sampleRate;const numChannels=audioBuffer.numberOfChannels;const length=audioBuffer.length;const channels=[];for(let ch=0;ch<numChannels;ch++){channels.push(audioBuffer.getChannelData(ch))}const encoder=await WasmMediaEncoder.createOggEncoder();encoder.configure({sampleRate:sampleRate,channels:numChannels,vbrQuality:5,});const chunkSize=4096;let outBuffers=[];let totalLength=0;for(let offset=0;offset<length;offset+=chunkSize){const chunkLen=Math.min(chunkSize,length-offset);const chunkChannels=[];for(let ch=0;ch<numChannels;ch++){chunkChannels.push(channels[ch].subarray(offset,offset+chunkLen))}const encoded=encoder.encode(chunkChannels);if(encoded.length>0){const copy=new Uint8Array(encoded);outBuffers.push(copy);totalLength+=copy.length}}const finalData=encoder.finalize();if(finalData.length>0){const copy=new Uint8Array(finalData);outBuffers.push(copy);totalLength+=copy.length}const result=new Uint8Array(totalLength);let pos=0;for(const buf of outBuffers){result.set(buf,pos);pos+=buf.length}return new Blob([result],{type:'audio/ogg'})}togglePlay(){if(this.isPlaying){this.pause()}else{this.play()}}play(){if(!this.sourceBuffer)return;if(!this.processedBuffer&&this.playbackRate!==1){return}if(this.audioContext.state==='suspended'){this.audioContext.resume()}this.sourceNode=this.audioContext.createBufferSource();this.sourceNode.buffer=this.processedBuffer||this.sourceBuffer;this.sourceNode.connect(this.audioContext.destination);const offset=this.pauseTime;const duration=this.getEffectiveDuration()-offset;if(duration<=0){this.pauseTime=0;this.play();return}this.sourceNode.start(0,offset);this.startTime=this.audioContext.currentTime-offset;this.isPlaying=true;this.playBtn.textContent='⏸';this.sourceNode.onended=()=>{if(this.isPlaying){this.stop();this.pauseTime=0;this.currentTimeEl.textContent='00:00';this.drawWaveform(this.sourceBuffer)}};this.updateProgress()}pause(){if(!this.isPlaying)return;this.pauseTime=this.audioContext.currentTime-this.startTime;this.sourceNode.stop();this.sourceNode.disconnect();this.isPlaying=false;this.playBtn.textContent='▶';if(this.animationId){cancelAnimationFrame(this.animationId)}}stop(){if(this.sourceNode){try{this.sourceNode.stop();this.sourceNode.disconnect()}catch(e){}}this.isPlaying=false;this.playBtn.textContent='▶';if(this.animationId){cancelAnimationFrame(this.animationId)}}updateProgress(){if(!this.isPlaying)return;const current=this.audioContext.currentTime-this.startTime;const total=this.getEffectiveDuration();const progress=Math.min(current/total,1);this.currentTimeEl.textContent=this.formatTime(current);this.drawPlayhead(progress);this.animationId=requestAnimationFrame(()=>this.updateProgress())}getEffectiveDuration(){if(!this.processedBuffer){return this.sourceBuffer.duration/this.playbackRate}return this.processedBuffer.duration}formatTime(seconds){const mins=Math.floor(seconds/60);const secs=Math.floor(seconds%60);return`${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`}}const player=new AudioPlayer();</script></body></html>
