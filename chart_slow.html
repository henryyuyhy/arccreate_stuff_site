<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>谱面变速</title><script src="chart-speed-processor-core.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:40px;max-width:500px;width:100%}h1{color:#333;font-size:24px;margin-bottom:8px;text-align:center}.subtitle{color:#666;font-size:14px;text-align:center;margin-bottom:32px}.form-group{margin-bottom:24px}label{display:block;color:#333;font-weight:600;margin-bottom:8px;font-size:14px}.file-upload{border:2px dashed#ddd;border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.3s ease}.file-upload:hover{border-color:#667eea;background:#f8f9ff}.file-upload.dragover{border-color:#667eea;background:#f0f2ff}.file-icon{font-size:40px;margin-bottom:12px}.file-text{color:#666;font-size:14px}.file-name{color:#667eea;font-weight:600;margin-top:8px;word-break:break-all}input[type="file"]{display:none}input[type="number"]{width:100%;padding:12px 16px;border:2px solid#ddd;border-radius:8px;font-size:16px;transition:border-color 0.3s ease}input[type="number"]:focus{outline:none;border-color:#667eea}.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s ease}.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;margin-bottom:12px}.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,0.4)}.btn-primary:disabled{opacity:0.5;cursor:not-allowed}.btn-secondary{background:#f0f0f0;color:#333;display:none}.btn-secondary:hover{background:#e0e0e0}.btn-secondary.show{display:block}.status{text-align:center;margin-top:20px;font-size:14px;min-height:20px}.status.success{color:#10b981}.status.error{color:#ef4444}</style></head><body><div class="container"><h1>谱面变速</h1><p class="subtitle"></p><div class="form-group"><label>选择谱面文件</label><div class="file-upload"id="fileUpload"><div class="file-icon">📁</div><div class="file-text">点击或拖拽文件到此处</div><div class="file-name"id="fileName"></div></div><input type="file"id="fileInput"accept=".aff,.txt,*"></div><div class="form-group"><label>变速倍率(例:2.0=两倍速,0.5=半速)</label><input type="number"id="speedInput"step="0.01"min="0.01"value="1.0"placeholder="请输入变速倍率"></div><button class="btn btn-primary"id="processBtn"disabled>处理谱面</button><button class="btn btn-secondary"id="downloadBtn">下载处理后的谱面</button><div class="status"id="status"></div></div><script>let fileContent='';let processedContent='';let originalFileName='';const fileUpload=document.getElementById('fileUpload');const fileInput=document.getElementById('fileInput');const fileName=document.getElementById('fileName');const speedInput=document.getElementById('speedInput');const processBtn=document.getElementById('processBtn');const downloadBtn=document.getElementById('downloadBtn');const status=document.getElementById('status');fileUpload.addEventListener('click',()=>fileInput.click());fileUpload.addEventListener('dragover',(e)=>{e.preventDefault();fileUpload.classList.add('dragover')});fileUpload.addEventListener('dragleave',()=>fileUpload.classList.remove('dragover'));fileUpload.addEventListener('drop',(e)=>{e.preventDefault();fileUpload.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});fileInput.addEventListener('change',(e)=>{if(e.target.files.length)handleFile(e.target.files[0])});function handleFile(file){originalFileName=file.name;fileName.textContent=file.name;processBtn.disabled=false;status.textContent='';status.className='status';const reader=new FileReader();reader.onload=(e)=>{fileContent=e.target.result;showStatus('文件读取成功','success')};reader.onerror=()=>showStatus('文件读取失败','error');reader.readAsText(file)}function showStatus(message,type){status.textContent=message;status.className='status '+type}processBtn.addEventListener('click',()=>{const speedScale=parseFloat(speedInput.value);if(!fileContent){showStatus('请先选择谱面文件','error');return}try{processedContent=ChartProcessor.processAffStrict(fileContent,speedScale);downloadBtn.classList.add('show');showStatus('处理完成','success')}catch(error){showStatus('处理失败: '+error.message,'error');console.error(error)}});downloadBtn.addEventListener('click',()=>{if(!processedContent){showStatus('没有可下载的内容','error');return}const blob=new Blob([processedContent],{type:'text/plain'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const speedScale=speedInput.value;const nameParts=originalFileName.split('.');const ext=nameParts.length>1?nameParts.pop():'';const baseName=nameParts.join('.');a.download=ext?`${baseName}_${speedScale}x.${ext}`:`${baseName}_${speedScale}x`;a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showStatus('下载已开始','success')});</script></body></html>
